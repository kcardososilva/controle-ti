{% extends 'base.html' %}
{% block title %}Excluir Categoria{% endblock %}
{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
<style>
.wrapper{max-width:640px;margin:22px auto;background:#fff;border:1px solid #e5e7eb;border-radius:16px;box-shadow:0 20px 40px rgba(2,6,23,.07);padding:28px;text-align:center}
h2{margin:0 0 10px;color:#0b1220}
p{color:#334155;font-size:1.05rem}
.row{display:flex;gap:10px;justify-content:center;margin-top:16px}
.btn{border:none;border-radius:12px;padding:10px 18px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-size:1rem}
.btn-danger{background:#ef4444;color:#fff}
.btn-back{background:#f3f4f6;color:#172133;border:1px solid #d8dee9}
</style>
<div class="wrapper">
  <h2><i class="fa fa-trash" style="color:#ef4444"></i> Excluir Categoria</h2>
  <p>Tem certeza que deseja excluir a categoria <strong>{{ obj.nome }}</strong>?</p>
  <p style="font-size:.9rem;color:#64748b">Esta ação não pode ser desfeita. Subtipos vinculados também serão removidos.</p>
  <form method="post">
    {% csrf_token %}
    <div class="row">
      <button class="btn btn-danger" type="submit"><i class="fa fa-trash"></i> Confirmar</button>
      <a class="btn btn-back" href="{% url 'categorias_list' %}"><i class="fa fa-arrow-left"></i> Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
