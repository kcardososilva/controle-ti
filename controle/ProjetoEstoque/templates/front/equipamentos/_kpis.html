<div class="kpi-card" style="background:#fff; padding:16px; border:1px solid var(--border); border-radius:12px; display:flex; align-items:center; gap:16px; box-shadow:0 1px 2px rgba(0,0,0,0.05);">
  <div style="width:48px; height:48px; border-radius:12px; background:var(--success-bg); color:var(--success-text); display:flex; align-items:center; justify-content:center; font-size:1.25rem;">
    <i class="fa fa-check-circle"></i>
  </div>
  <div>
    <div style="font-size:0.75rem; font-weight:700; text-transform:uppercase; color:var(--text-muted);">Ativos</div>
    <div style="font-size:1.5rem; font-weight:800; color:var(--text-main);">{{ total_ativos }}</div>
  </div>
</div>
