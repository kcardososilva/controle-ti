<div class="pagination-container">
    <div class="pagination-info">
        {% if total > 0 %}
            Exibindo
            <strong>{{ page_obj.start_index }}</strong>
            a
            <strong>{{ page_obj.end_index }}</strong>
            de
            <strong>{{ total }}</strong>
            registro(s)
        {% else %}
            Nenhum registro encontrado
        {% endif %}
    </div>

    <div class="pagination-controls" aria-label="Paginação de funcionários">
        {% if page_obj.has_previous %}
            <a href="?page={{ page_obj.previous_page_number }}&{{ qs_keep }}" data-page="{{ page_obj.previous_page_number }}" class="ul-btn ul-btn-outline">
                <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
                Anterior
            </a>
        {% else %}
            <span class="ul-btn ul-btn-outline is-disabled" aria-disabled="true">
                <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
                Anterior
            </span>
        {% endif %}

        {% if page_obj.has_next %}
            <a href="?page={{ page_obj.next_page_number }}&{{ qs_keep }}" data-page="{{ page_obj.next_page_number }}" class="ul-btn ul-btn-outline">
                Próxima
                <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
            </a>
        {% else %}
            <span class="ul-btn ul-btn-outline is-disabled" aria-disabled="true">
                Próxima
                <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
            </span>
        {% endif %}
    </div>
</div>
