{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fbfbfd">
  <title>Acesso não configurado — Zelo</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'img/zelo-mark.svg' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      color-scheme: light;
      --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Helvetica Neue", system-ui, sans-serif;
      --bg-page: #fbfbfd; --bg-page-2: #f5f5f7; --bg-elevated: #ffffff;
      --text-primary: #1d1d1f; --text-secondary: #6e6e73;
      --separator-hairline: rgba(0,0,0,.06);
      --brand: #0071e3; --brand-hover: #0077ed;
      --warning: #ff9500; --warning-soft: rgba(255,149,0,.14);
      --radius-lg: 18px; --radius-pill: 980px;
      --shadow-lg: 0 12px 32px rgba(0,0,0,.10), 0 4px 12px rgba(0,0,0,.05);
      --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    body.theme-dark {
      color-scheme: dark;
      --bg-page: #000; --bg-page-2: #1d1d1f; --bg-elevated: #1d1d1f;
      --text-primary: #f5f5f7; --text-secondary: #a1a1a6;
      --separator-hairline: rgba(255,255,255,.08);
      --brand: #2997ff; --brand-hover: #3b9eff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; min-width: 0; }
    body {
      font-family: var(--font-sans); min-height: 100dvh; display: grid; place-items: center;
      padding: 1.5rem calc(1.5rem + var(--safe-bottom)) 1.5rem 1.5rem; padding-top: calc(1.5rem + var(--safe-top));
      background: linear-gradient(180deg, var(--bg-page), var(--bg-page-2)); color: var(--text-primary);
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    .box {
      max-width: 26rem; width: 100%; text-align: center; padding: 2rem 1.75rem;
      background: var(--bg-elevated); border: 1px solid var(--separator-hairline); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
    }
    .ic {
      width: 2.75rem; height: 2.75rem; margin: 0 auto 1rem; display: grid; place-items: center;
      border-radius: 999px; background: var(--warning-soft); color: var(--warning); font-size: 1.1rem;
    }
    h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: .5rem; }
    p { color: var(--text-secondary); font-size: .86rem; line-height: 1.55; margin-bottom: .35rem; }
    .logout {
      display: inline-flex; align-items: center; gap: .5rem; margin-top: 1.25rem;
      padding: .58rem 1.2rem; border: 1px solid transparent; border-radius: var(--radius-pill);
      background: var(--brand); color: #fff; font: inherit; font-weight: 600; font-size: .85rem; cursor: pointer;
      transition: background .15s;
    }
    .logout:hover { background: var(--brand-hover); }
  </style>
</head>
<body class="theme-light">
  <script>
    (function () {
      try { if (localStorage.getItem('controleTI.theme') === 'dark') { document.body.classList.remove('theme-light'); document.body.classList.add('theme-dark'); } } catch (e) {}
    })();
  </script>
  <div class="box">
    <div class="ic"><i class="fa-solid fa-id-card-clip"></i></div>
    <h1>Acesso ainda não configurado</h1>
    <p>Seu usuário está registrado, mas ainda não foi vinculado a um fornecedor no Portal.</p>
    <p>Entre em contato com o time de TI da Santa Colomba para concluir a liberação do seu acesso.</p>
    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <button type="submit" class="logout"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sair</button>
    </form>
  </div>
</body>
</html>
