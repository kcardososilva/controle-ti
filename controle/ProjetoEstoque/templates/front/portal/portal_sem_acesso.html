{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso não configurado — Zelo</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'img/zelo-mark.svg' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100dvh; display: grid; place-items: center; padding: 1.5rem;
      background: linear-gradient(180deg, #fbfbfd, #f5f5f7); color: #1d1d1f;
    }
    .box {
      max-width: 30rem; width: 100%; text-align: center; padding: 2.5rem 2rem;
      background: #fff; border: 1px solid rgba(0,0,0,.06); border-radius: 22px;
      box-shadow: 0 12px 32px rgba(0,0,0,.10);
    }
    .ic {
      width: 4rem; height: 4rem; margin: 0 auto 1.25rem; display: grid; place-items: center;
      border-radius: 999px; background: rgba(255,149,0,.14); color: #ff9500; font-size: 1.6rem;
    }
    h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -.03em; margin-bottom: .6rem; }
    p { color: #6e6e73; font-size: .92rem; line-height: 1.55; margin-bottom: .4rem; }
    .logout {
      display: inline-flex; align-items: center; gap: .5rem; margin-top: 1.5rem;
      padding: .7rem 1.3rem; border: 1px solid rgba(0,0,0,.1); border-radius: 980px;
      background: #0071e3; color: #fff; font-weight: 700; font-size: .9rem; cursor: pointer;
    }
    .logout:hover { background: #0077ed; }
  </style>
</head>
<body>
  <div class="box">
    <div class="ic"><i class="fa-solid fa-id-card-clip"></i></div>
    <h1>Acesso ainda não configurado</h1>
    <p>Seu usuário está registrado, mas ainda não foi vinculado a um fornecedor no Portal.</p>
    <p>Entre em contato com o time de TI da Santa Colomba para concluir a liberação do seu acesso.</p>
    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <button type="submit" class="logout"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sair</button>
    </form>
  </div>
</body>
</html>
