<div class="pf-form-section">
  <h4><i class="fa-solid fa-dolly"></i> Lote de destino</h4>
  <div class="pf-grid2">
    <div>
      <label for="lote_id">Lote *</label>
      <select id="lote_id" name="lote_id" class="pf-select2">
        {% for l in lotes_abertos %}
          <option value="{{ l.pk }}">{{ l.nome }} ({{ l.quantidade_itens }} item{{ l.quantidade_itens|pluralize }})</option>
        {% endfor %}
        <option value="novo" {% if not lotes_abertos %}selected{% endif %}>+ Criar novo lote</option>
      </select>
    </div>
    <div id="wrap_lote_novo" {% if lotes_abertos %}hidden{% endif %}>
      <label for="lote_nome_novo">Nome do novo lote</label>
      <input type="text" id="lote_nome_novo" name="lote_nome_novo" placeholder="Ex: Retorno de reparos">
    </div>
  </div>
</div>

<div class="pf-form-section">
  <h4><i class="fa-solid fa-location-dot"></i> Destino da devolução</h4>
  <div class="pf-grid2">
    <div>
      <label for="localidade_devolucao">Localidade de destino *</label>
      <select id="localidade_devolucao" name="localidade_devolucao" class="pf-select2" required>
        <option value="">Selecione a localidade…</option>
        {% for loc in localidades %}
          <option value="{{ loc.id }}" {% if ordem.item.localidade_id == loc.id %}selected{% endif %}>{{ loc.local }}</option>
        {% endfor %}
      </select>
    </div>
    <div style="grid-column:1 / -1;">
      <label for="observacao">Observação (opcional)</label>
      <input type="text" id="observacao" name="observacao" placeholder="Ex: transportadora, NF…">
    </div>
  </div>
</div>
