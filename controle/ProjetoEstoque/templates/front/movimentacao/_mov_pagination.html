{% if page_obj.has_other_pages %}
<div class="pagination">
    <span class="pagination-info">
        Mostrando <strong>{{ page_obj.start_index }}</strong>–<strong>{{ page_obj.end_index }}</strong>
        de <strong>{{ page_obj.paginator.count }}</strong>
    </span>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
        {% if page_obj.has_previous %}
            <a href="?page={{ page_obj.previous_page_number }}&{{ qs_keep }}" class="btn btn-light">
                <i class="fa fa-chevron-left"></i> Anterior
            </a>
        {% endif %}
        {% if page_obj.has_next %}
            <a href="?page={{ page_obj.next_page_number }}&{{ qs_keep }}" class="btn btn-light">
                Próxima <i class="fa fa-chevron-right"></i>
            </a>
        {% endif %}
    </div>
</div>
{% endif %}
