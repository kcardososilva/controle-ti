<div class="kpi-card" style="--kpi-color: var(--in-primary);">
    <div class="kpi-icon"><i class="fa fa-list-check"></i></div>
    <div class="kpi-body">
        <span class="kpi-label">Ocorrências</span>
        <span class="kpi-value">{{ kpi.total }}</span>
        <span class="kpi-sub">Total filtrado</span>
    </div>
</div>

<div class="kpi-card" style="--kpi-color: var(--in-danger);">
    <div class="kpi-icon"><i class="fa fa-triangle-exclamation"></i></div>
    <div class="kpi-body">
        <span class="kpi-label">Críticas</span>
        <span class="kpi-value">{{ kpi.criticos }}</span>
        <span class="kpi-sub">Ação imediata</span>
    </div>
</div>

<div class="kpi-card" style="--kpi-color: var(--in-warning);">
    <div class="kpi-icon"><i class="fa fa-circle-exclamation"></i></div>
    <div class="kpi-body">
        <span class="kpi-label">Altas</span>
        <span class="kpi-value">{{ kpi.altos }}</span>
        <span class="kpi-sub">Impacto operacional</span>
    </div>
</div>

<div class="kpi-card" style="--kpi-color: var(--in-info);">
    <div class="kpi-icon"><i class="fa fa-copy"></i></div>
    <div class="kpi-body">
        <span class="kpi-label">Duplicados</span>
        <span class="kpi-value">{{ kpi.duplicados }}</span>
        <span class="kpi-sub">Dados repetidos</span>
    </div>
</div>

<div class="kpi-card" style="--kpi-color: var(--in-success);">
    <div class="kpi-icon"><i class="fa fa-shield-halved"></i></div>
    <div class="kpi-body">
        <span class="kpi-label">Riscos</span>
        <span class="kpi-value">{{ kpi.riscos }}</span>
        <span class="kpi-sub">Governança</span>
    </div>
</div>
